<!-- Темный полноэкранный блок, который перекрывает весь сайт -->
<div id="lock" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#111; color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999999; font-family:sans-serif;">
  
  <h2>Доступ ограничен</h2>
  
  <!-- Поле для ввода скрытого пароля -->
  <input type="password" id="pass" placeholder="Пароль" style="padding:10px; background:#222; border:1px solid #444; color:#fff; border-radius:4px;">
  
  <!-- Кнопка проверки: если пароль "123", мы просто удаляем этот блок и открываем сайт -->
  <button onclick="if(document.getElementById('pass').value==='123'){document.getElementById('lock').remove()}else{alert('Неверно!')}" style="margin-top:10px; padding:10px 20px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer;">
    Войти
  </button>

</div>
